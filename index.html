<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MBTI 人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#07C160;--primary-dark:#06AD56;--primary-light:#E8F8EE;--bg:#F5F5F5;--card-bg:#FFFFFF;--text-primary:#1A1A1A;--text-secondary:#666666;--text-light:#999999;--border:#EFEFEF;--shadow:0 2px 12px rgba(0,0,0,0.08);--radius:16px;--radius-sm:10px;--danger:#E74C3C;--progress-bg:#E8E8E8}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text-primary);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
.page{display:none;min-height:100vh;padding:20px}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
#homePage.active{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#07C160 0%,#06AD56 50%,#059B4B 100%);padding:40px 30px;text-align:center}
.home-icon{width:100px;height:100px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:30px;animation:pulse 2s infinite}
.home-title{font-size:32px;font-weight:700;color:#FFF;margin-bottom:12px;letter-spacing:2px}
.home-subtitle{font-size:16px;color:rgba(255,255,255,0.85);margin-bottom:40px;line-height:1.8}
.home-features{display:flex;flex-direction:column;gap:12px;margin-bottom:40px;width:100%;max-width:320px}
.feature-item{display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.9);font-size:14px}
.feature-item .check{width:22px;height:22px;background:rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.btn-start{width:100%;max-width:300px;padding:16px 0;background:#FFF;color:var(--primary);border:none;border-radius:50px;font-size:18px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.15);-webkit-tap-highlight-color:transparent}
.btn-start:active{transform:scale(0.97)}
.btn-resume{margin-bottom:10px;background:rgba(255,255,255,0.95)!important}
.btn-resume .small{font-size:13px;font-weight:400;color:var(--text-light)}
.home-note{margin-top:20px;font-size:12px;color:rgba(255,255,255,0.6)}
.home-userbar{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;color:rgba(255,255,255,0.9)}
.home-userbar .greeting{font-size:15px}
.home-userbar .username{font-size:16px;font-weight:600}
.home-userbar .switch-link{font-size:12px;color:rgba(255,255,255,0.7);text-decoration:underline;cursor:pointer;-webkit-tap-highlight-color:transparent;padding:4px}
.home-userbar .switch-link:active{color:#fff}
.home-links{display:flex;gap:24px;margin-bottom:30px;justify-content:center;flex-wrap:wrap}
.home-links a{color:rgba(255,255,255,0.85);font-size:14px;cursor:pointer;text-decoration:none;-webkit-tap-highlight-color:transparent;padding:4px 8px;border-radius:8px}
.home-links a:active{background:rgba(255,255,255,0.15);color:#fff}
.test-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding:0 4px}
.test-header .back-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-secondary);padding:4px 8px;-webkit-tap-highlight-color:transparent}
.test-header .progress-text{font-size:14px;color:var(--text-secondary);font-weight:500}
.progress-bar-container{width:100%;height:6px;background:var(--progress-bg);border-radius:3px;margin-bottom:30px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),#07E070);border-radius:3px;transition:width .5s ease;width:0%}
.question-card{background:var(--card-bg);border-radius:var(--radius);padding:30px 24px;box-shadow:var(--shadow)}
.question-number{display:inline-block;background:var(--primary-light);color:var(--primary);font-size:13px;font-weight:600;padding:4px 14px;border-radius:20px;margin-bottom:16px}
.question-text{font-size:18px;font-weight:500;line-height:1.7;margin-bottom:30px;color:var(--text-primary)}
.options{display:flex;flex-direction:column;gap:10px}
.option-item{padding:14px 18px;border:2px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:15px;color:var(--text-secondary);text-align:center;background:var(--card-bg);-webkit-tap-highlight-color:transparent;user-select:none;transition:all .2s ease}
.option-item:active{transform:scale(0.97)}
.option-item.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary);font-weight:500}
#resultPage{padding:30px 20px}
.result-header{text-align:center;margin-bottom:30px}
.result-type{font-size:56px;font-weight:800;color:var(--primary);letter-spacing:6px;margin-bottom:8px}
.result-name{font-size:20px;color:var(--text-primary);font-weight:600;margin-bottom:6px}
.result-nickname{font-size:14px;color:var(--text-light);margin-bottom:20px}
.result-description{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.result-description h3{font-size:14px;color:var(--text-light);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.result-description p{font-size:15px;color:var(--text-secondary);line-height:1.8}
.dimension-section{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.dimension-section h3{font-size:14px;color:var(--text-light);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.dimension-item{margin-bottom:16px}
.dimension-item:last-child{margin-bottom:0}
.dim-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dim-label .left{font-size:13px;font-weight:600;color:var(--text-primary)}
.dim-label .right{font-size:13px;color:var(--text-light)}
.dim-label .score{font-size:12px;color:var(--text-secondary)}
.dim-bar{height:8px;background:var(--progress-bg);border-radius:4px;overflow:hidden}
.dim-bar-fill{height:100%;background:linear-gradient(90deg,var(--primary),#07E070);border-radius:4px;transition:width 1s ease}
.dim-indicator{display:flex;justify-content:space-between;margin-top:4px;font-size:11px;color:var(--text-light)}
.traits-section{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.traits-section h3{font-size:14px;color:var(--text-light);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.traits-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.traits-column .trait-label{font-size:12px;color:var(--text-light);margin-bottom:8px;font-weight:500}
.trait-tags{display:flex;flex-wrap:wrap;gap:6px}
.trait-tag{padding:5px 12px;border-radius:15px;font-size:12px;font-weight:500}
.trait-tag.positive{background:var(--primary-light);color:var(--primary)}
.trait-tag.negative{background:#FFF0F0;color:var(--danger)}
.careers-section{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.careers-section h3{font-size:14px;color:var(--text-light);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.career-tags{display:flex;flex-wrap:wrap;gap:8px}
.career-tag{padding:6px 16px;background:#F0F0F0;border-radius:15px;font-size:13px;color:var(--text-secondary)}
.celebrities-section{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
.celebrities-section h3{font-size:14px;color:var(--text-light);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px}
.celeb-list{display:flex;flex-wrap:wrap;gap:8px}
.celeb-item{padding:6px 16px;background:#FFF8E0;border-radius:15px;font-size:13px;color:#B8860B}
.result-actions{display:flex;flex-direction:column;gap:12px;margin-top:20px}
.btn-restart{width:100%;padding:14px 0;background:var(--primary);color:#FFF;border:none;border-radius:50px;font-size:16px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-restart:active{transform:scale(0.97)}
.btn-share{width:100%;padding:14px 0;background:var(--card-bg);color:var(--text-secondary);border:2px solid var(--border);border-radius:50px;font-size:16px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-share:active{transform:scale(0.97);border-color:var(--primary);color:var(--primary)}
/* Result page history */
#resultHistory{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px}
#resultHistory h3{font-size:14px;color:var(--text-light);margin-bottom:16px;text-transform:uppercase;letter-spacing:1px}
.history-mini-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.history-mini-item:last-child{border-bottom:none}
.history-mini-type{font-size:18px;font-weight:700;color:var(--primary);min-width:44px}
.history-mini-info{flex:1}
.history-mini-name{font-size:13px;color:var(--text-secondary)}
.history-mini-date{font-size:11px;color:var(--text-light)}
/* Messages page */
#messagesPage{display:flex;flex-direction:column;height:100dvh;padding:20px}
#messagesPage.page.active{display:flex}
.messages-header{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:0 4px;flex-shrink:0}
.messages-header .back-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-secondary);padding:4px 8px;-webkit-tap-highlight-color:transparent}
.messages-header .title{font-size:18px;font-weight:600;color:var(--text-primary);flex:1}
.message-list{flex:1;overflow-y:auto;padding:0 4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.message-list-inner{display:flex;flex-direction:column;gap:12px;padding-bottom:8px}
.message-item{background:var(--card-bg);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
.msg-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.msg-user{font-size:13px;font-weight:600;color:var(--primary)}
.msg-time{font-size:11px;color:var(--text-light)}
.msg-text{font-size:15px;color:var(--text-secondary);line-height:1.6;word-break:break-word}
.msg-empty{text-align:center;padding:60px 20px;color:var(--text-light);font-size:15px}
.message-input-area{display:flex;gap:10px;padding:12px 0;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.message-input{flex:1;padding:10px 16px;border:2px solid var(--border);border-radius:20px;font-size:15px;outline:none;transition:border-color .2s}
.message-input:focus{border-color:var(--primary)}
.btn-send{padding:10px 22px;background:var(--primary);color:#fff;border:none;border-radius:20px;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn-send:active{transform:scale(0.97)}
/* History page */
#historyPage{padding:20px}
.history-header{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding:0 4px}
.history-header .back-btn{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-secondary);padding:4px 8px;-webkit-tap-highlight-color:transparent}
.history-header .title{font-size:18px;font-weight:600;color:var(--text-primary);flex:1}
.history-list-inner{display:flex;flex-direction:column;gap:12px}
.history-card{background:var(--card-bg);border-radius:var(--radius-sm);padding:16px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:14px;-webkit-tap-highlight-color:transparent;transition:transform .15s}
.history-card:active{transform:scale(0.98)}
.history-card-type{font-size:30px;font-weight:700;color:var(--primary);letter-spacing:2px;min-width:64px;text-align:center}
.history-card-info{flex:1}
.history-card-name{font-size:16px;font-weight:500;color:var(--text-primary)}
.history-card-date{font-size:12px;color:var(--text-light);margin-top:3px}
.history-empty{text-align:center;padding:80px 20px;color:var(--text-light);font-size:15px;line-height:2}
/* Username modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:30px;animation:fadeIn .2s ease}
.modal-overlay.hidden{display:none}
.modal-content{background:#fff;border-radius:var(--radius);padding:30px 24px;width:100%;max-width:340px;text-align:center;animation:slideUp .3s ease}
.modal-content h3{font-size:20px;margin-bottom:8px;color:var(--text-primary)}
.modal-content p{font-size:14px;color:var(--text-light);margin-bottom:20px;line-height:1.6}
.modal-input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;outline:none;text-align:center;margin-bottom:20px;transition:border-color .2s}
.modal-input:focus{border-color:var(--primary)}
.modal-input::placeholder{color:#ccc}
.modal-error{color:var(--danger);font-size:13px;margin-bottom:12px;display:none}
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.75);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;opacity:0;transition:all .3s ease;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:480px){#homePage,#testPage,#resultPage,#messagesPage,#historyPage{max-width:480px;margin:0 auto}}
@media(max-width:360px){.question-text{font-size:16px}.option-item{font-size:14px;padding:12px 14px}.result-type{font-size:44px}}
</style>
</head>
<body>

<!-- ============= HOME PAGE ============= -->
<div id="homePage" class="page active">
  <div class="home-icon">🧠</div>
  <h1 class="home-title">MBTI 人格测试</h1>
  <div id="homeUserBar" class="home-userbar" style="display:none">
    <span class="greeting">👋</span>
    <span class="username" id="displayName">用户</span>
    <span class="switch-link" onclick="switchUser()">切换</span>
  </div>
  <p class="home-subtitle">93 道精选题目 · 15 分钟完成<br>发现你的性格密码</p>
  <div class="home-features">
    <div class="feature-item"><span class="check">✓</span><span>专业题库，覆盖四大维度</span></div>
    <div class="feature-item"><span class="check">✓</span><span>详细结果，16种人格解析</span></div>
    <div class="feature-item"><span class="check">✓</span><span>断点续做，关闭页面后自动保存</span></div>
    <div class="feature-item"><span class="check">✓</span><span>数据仅保存在本地</span></div>
  </div>
  <button id="btnResume" class="btn-start btn-resume" onclick="resumeTest()" style="display:none">继续测试 <span class="small"></span></button>
  <button id="btnStart" class="btn-start" onclick="startTest()">开始测试</button>
  <div class="home-links">
    <a onclick="showMessages()">💬 留言板</a>
    <a onclick="showHistory()">📋 历史记录</a>
  </div>
  <p class="home-note">测试结果仅供娱乐参考</p>
</div>

<!-- ============= TEST PAGE ============= -->
<div id="testPage" class="page">
  <div class="test-header">
    <button class="back-btn" onclick="prevQuestion()">‹</button>
    <span class="progress-text" id="progressText">0 / 93</span>
  </div>
  <div class="progress-bar-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div id="questionContainer"></div>
</div>

<!-- ============= RESULT PAGE ============= -->
<div id="resultPage" class="page">
  <div class="result-header">
    <div class="result-type" id="resultType">INTJ</div>
    <div class="result-name" id="resultName">建筑师型人格</div>
    <div class="result-nickname" id="resultNickname">「策略家」</div>
  </div>
  <div class="result-description"><h3>类型概述</h3><p id="resultSummary"></p></div>
  <div class="result-description"><h3>详细解读</h3><p id="resultDetail"></p></div>
  <div class="dimension-section"><h3>维度分析</h3><div id="dimensionBars"></div></div>
  <div class="traits-section">
    <h3>性格特质</h3>
    <div class="traits-grid">
      <div class="traits-column"><div class="trait-label">✨ 优势</div><div class="trait-tags" id="strengths"></div></div>
      <div class="traits-column"><div class="trait-label">⚠️ 弱势</div><div class="trait-tags" id="weaknesses"></div></div>
    </div>
  </div>
  <div class="careers-section"><h3>适合职业</h3><div class="career-tags" id="careerTags"></div></div>
  <div class="celebrities-section"><h3>代表人物</h3><div class="celeb-list" id="celebList"></div></div>
  <div id="resultHistory" style="display:none">
    <h3>📋 过往记录</h3>
    <div id="resultHistoryList"></div>
  </div>
  <div class="result-actions">
    <button class="btn-restart" onclick="restartTest()">重新测试</button>
    <button class="btn-share" onclick="shareResult()">📤 分享结果</button>
  </div>
</div>

<!-- ============= MESSAGES PAGE ============= -->
<div id="messagesPage" class="page">
  <div class="messages-header">
    <button class="back-btn" onclick="show('home')">‹</button>
    <span class="title">💬 留言板</span>
  </div>
  <div class="message-list" id="messageList">
    <div class="msg-empty">暂无留言，来写下第一条吧 ✍️</div>
  </div>
  <div class="message-input-area">
    <input class="message-input" id="messageInput" placeholder="说点什么..." maxlength="200" onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="btn-send" onclick="sendMessage()">发送</button>
  </div>
</div>

<!-- ============= HISTORY PAGE ============= -->
<div id="historyPage" class="page">
  <div class="history-header">
    <button class="back-btn" onclick="show('home')">‹</button>
    <span class="title">📋 历史记录</span>
  </div>
  <div id="historyList" class="history-list-inner"></div>
</div>

<!-- ============= USERNAME MODAL ============= -->
<div id="nameModal" class="modal-overlay">
  <div class="modal-content">
    <h3>✏️ 设置昵称</h3>
    <p>输入昵称后，你的测试进度和结果将被保存，关闭页面后也可以继续做题</p>
    <div class="modal-error" id="nameError">昵称不能为空</div>
    <input class="modal-input" id="nameInput" placeholder="请输入你的昵称" maxlength="20" onkeydown="if(event.key==='Enter')submitName()">
    <button class="btn-start" onclick="submitName()" style="margin:0 auto">确认</button>
  </div>
</div>

<!-- ============= TOAST ============= -->
<div id="toast" class="toast"></div>

<script>
// ============================================================
//  1. QUESTIONS (93题, 24 E/I + 23 S/N + 23 T/F + 23 J/P)
// ============================================================
var questions=[

// ============================================================
//  3. CORE STATE & LOGIC (保留原有逻辑)
// ============================================================
var state={cp:'home',cq:0,ans:[],total:questions.length};
function init(){state.ans=new Array(state.total).fill(-1);state.cq=0}
function show(p){document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active')});var el=document.getElementById(p+'Page');if(el){el.classList.add('active')}window.scrollTo(0,0)}

function startTest(){
  if(!getCurrentUser()){showNameModal();return}
  init();clearSession();show('test');renderQ();updateP()
}
function renderQ(){
  var q=questions[state.cq],labels=['非常不同意','不同意','中立','同意','非常同意'],html='<div class="question-card"><div class="question-number">第 '+(state.cq+1)+' / '+state.total+' 题</div><div class="question-text">'+q.text+'</div><div class="options">';
  for(var i=0;i<5;i++){var sel=state.ans[state.cq]===i?' selected':'';html+='<div class="option-item'+sel+'" onclick="sel(this,'+i+')">'+labels[i]+'</div>'}
  html+='</div></div>';document.getElementById('questionContainer').innerHTML=html;
}
function sel(el,s){
  document.querySelectorAll('.option-item').forEach(function(x){x.classList.remove('selected');x.onclick=null});el.classList.add('selected');
  state.ans[state.cq]=s;
  saveSession();
  setTimeout(function(){
    if(state.cq<state.total-1){state.cq++;renderQ();updateP()}else calcR();
  },300);
}
function updateP(){
  var a=state.ans.filter(function(x){return x!==-1}).length;
  document.getElementById('progressBar').style.width=(a/state.total*100)+'%';
  document.getElementById('progressText').textContent=a+' / '+state.total;
}
function prevQuestion(){
  if(state.cq>0){state.cq--;renderQ();updateP()}else show('home');
}
function calcR(){
  try{
    updateP();
    var es=0,ss=0,ts=0,js=0,ec=0,sc=0,tc=0,jc=0;
    for(var i=0;i<questions.length;i++){var q=questions[i],sc2=state.ans[i];if(sc2===undefined||sc2===-1||sc2===null)sc2=2;var ad=q.r===1?sc2:(4-sc2);
      if(q.d==='ei'){es+=ad;ec++}else if(q.d==='sn'){ss+=ad;sc++}else if(q.d==='tf'){ts+=ad;tc++}else if(q.d==='jp'){js+=ad;jc++}}
    var ea=es/ec,sa=ss/sc,ta=ts/tc,ja=js/jc;
    var code=(ea>=2?'E':'I')+(sa>=2?'S':'N')+(ta>=2?'T':'F')+(ja>=2?'J':'P'),data=personalityTypes[code];
    if(!data){show('result');document.getElementById('resultType').textContent='??';document.getElementById('resultName').textContent='无法识别，请重试';return}
    saveResult(code,data.name,{ei:ea,sn:sa,tf:ta,jp:ja});
    clearSession();
    showR(code,data,{ei:ea,sn:sa,tf:ta,jp:ja});
  }catch(e){show('result');document.getElementById('resultType').textContent='!?';document.getElementById('resultName').textContent='计算出错，请重试'}
}
function showR(code,data,s){
  show('result');
  document.getElementById('resultType').textContent=code;
  document.getElementById('resultName').textContent=data.name;
  document.getElementById('resultNickname').textContent='「'+data.nk+'」';
  document.getElementById('resultSummary').textContent=data.desc;
  document.getElementById('resultDetail').textContent=data.detail;
  var dims=[{l:'I 内向',r:'E 外向',v:s.ei},{l:'N 直觉',r:'S 实感',v:s.sn},{l:'F 情感',r:'T 理性',v:s.tf},{l:'P 感知',r:'J 判断',v:s.jp}],html='';
  for(var i=0;i<dims.length;i++){var d=dims[i];html+='<div class="dimension-item"><div class="dim-label"><span class="left">'+d.l+'</span><span class="score">'+d.v.toFixed(1)+'</span><span class="right">'+d.r+'</span></div><div class="dim-bar"><div class="dim-bar-fill" style="width:'+(d.v/4*100)+'%"></div></div><div class="dim-indicator"><span>0</span><span>2</span><span>4</span></div></div>'}
  document.getElementById('dimensionBars').innerHTML=html;
  document.getElementById('strengths').innerHTML=data.p.map(function(s){return '<span class="trait-tag positive">'+s+'</span>'}).join('');
  document.getElementById('weaknesses').innerHTML=data.n.map(function(w){return '<span class="trait-tag negative">'+w+'</span>'}).join('');
  document.getElementById('careerTags').innerHTML=data.c.map(function(c){return '<span class="career-tag">'+c+'</span>'}).join('');
  document.getElementById('celebList').innerHTML=data.ce.map(function(c){return '<span class="celeb-item">'+c+'</span>'}).join('');
  showResultHistory();
}
function restartTest(){
  init();clearSession();show('home');updateHomeUI(getCurrentUser())
}

// ============================================================
//  4. SHARE & TOAST (保留原有)
// ============================================================
function shareResult(){
  var t=document.getElementById('resultType').textContent,n=document.getElementById('resultName').textContent;
  var text='我测出的 MBTI 人格类型是：'+t+'「'+n+'」！快来测测你的性格类型吧 🎯';
  if(navigator.share){navigator.share({title:'MBTI 人格测试',text:text,url:window.location.href}).catch(function(){})}else cp(text);
}
function cp(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(function(){toast('结果已复制，快去分享给朋友吧！')}).catch(function(){cp2(text)})}else cp2(text);
}
function cp2(text){
  var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('结果已复制，快去分享给朋友吧！')}catch(e){toast('复制失败，请手动复制')}
  document.body.removeChild(ta);
}
function toast(msg){
  var t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t)}
  t.textContent=msg;t.classList.add('show');clearTimeout(t._timer);t._timer=setTimeout(function(){t.classList.remove('show')},2500);
}

// ============================================================
//  5. LOCALSTORAGE UTILITIES
// ============================================================
var PREFIX='mbti_';
function store(key,val){
  try{if(val===null||val===undefined){localStorage.removeItem(PREFIX+key)}else{localStorage.setItem(PREFIX+key,JSON.stringify(val))}}catch(e){}
}
function load(key,def){
  try{var v=localStorage.getItem(PREFIX+key);return v!==null?JSON.parse(v):def}catch(e){return def}
}

// ============================================================
//  6. USER MANAGEMENT
// ============================================================
function getUsers(){return load('users',{})}
function getCurrentUser(){return load('current_user','')}
function setCurrentUser(name){
  name=name.trim();if(!name)return;
  var users=getUsers();if(!users[name])users[name]={created:Date.now()};
  store('users',users);store('current_user',name);
}

// ============================================================
//  7. SESSION MANAGEMENT (断点续做)
// ============================================================
function saveSession(){
  var user=getCurrentUser();if(!user)return;
  store('session_'+user,{cq:state.cq,ans:state.ans,updated:Date.now()});
}
function loadSession(){
  var user=getCurrentUser();return user?load('session_'+user,null):null;
}
function clearSession(){
  var user=getCurrentUser();if(user)store('session_'+user,null);
}
function countAnswered(ans){
  if(!ans)return 0;
  var c=0;for(var i=0;i<ans.length;i++){if(ans[i]!==-1&&ans[i]!==undefined&&ans[i]!==null)c++}return c;
}

// ============================================================
//  8. RESULT HISTORY
// ============================================================
function saveResult(code,name,scores){
  var user=getCurrentUser();if(!user)return;
  var results=load('results_'+user,[]);
  results.push({code:code,name:name,scores:scores,timestamp:Date.now()});
  store('results_'+user,results);
}
function getResults(){
  var user=getCurrentUser();return user?load('results_'+user,[]):[];
}

// ============================================================
//  9. MESSAGE BOARD
// ============================================================
function getMessages(){return load('messages',[])}
function addMessage(text){
  if(!text||!text.trim())return;
  var msgs=getMessages();
  msgs.push({username:getCurrentUser(),text:text.trim(),timestamp:Date.now()});
  store('messages',msgs);
}

// ============================================================
//  10. HOME UI
// ============================================================
function updateHomeUI(username){
  var bar=document.getElementById('homeUserBar');
  var btnResume=document.getElementById('btnResume');
  var btnStart=document.getElementById('btnStart');
  if(username){
    document.getElementById('displayName').textContent=username;
    bar.style.display='flex';
    var saved=loadSession();
    if(saved&&saved.ans&&saved.ans.length===state.total){
      var count=countAnswered(saved.ans);
      if(count>0&&count<state.total){
        btnResume.style.display='block';
        btnResume.querySelector('.small').textContent='(已完成 '+count+'/'+state.total+')';
        btnStart.textContent='重新开始';
      }else{btnResume.style.display='none';btnStart.textContent='开始测试'}
    }else{btnResume.style.display='none';btnStart.textContent='开始测试'}
  }else{
    bar.style.display='none';btnResume.style.display='none';btnStart.textContent='开始测试'
  }
}

// ============================================================
//  11. RESUME TEST
// ============================================================
function resumeTest(){
  if(!getCurrentUser()){showNameModal();return}
  var saved=loadSession();
  if(!saved||!saved.ans||saved.ans.length!==state.total){startTest();return}
  state.cq=saved.cq;
  state.ans=saved.ans;
  show('test');renderQ();updateP();
}

// ============================================================
//  12. NAME MODAL
// ============================================================
function showNameModal(){
  document.getElementById('nameModal').classList.remove('hidden');
  document.getElementById('nameInput').value='';
  document.getElementById('nameError').style.display='none';
  setTimeout(function(){document.getElementById('nameInput').focus()},300);
}
function hideNameModal(){
  document.getElementById('nameModal').classList.add('hidden');
}
function submitName(){
  var name=document.getElementById('nameInput').value.trim();
  if(!name){document.getElementById('nameError').style.display='block';return}
  setCurrentUser(name);
  hideNameModal();
  updateHomeUI(name);
}
function switchUser(){
  store('current_user',null);
  showNameModal();
}

// ============================================================
//  13. MESSAGES
// ============================================================
function showMessages(){
  show('messages');renderMessages();
}
function renderMessages(){
  var msgs=getMessages();
  var el=document.getElementById('messageList');
  if(msgs.length===0){el.innerHTML='<div class="msg-empty">暂无留言，来写下第一条吧 ✍️</div>';return}
  var html='<div class="message-list-inner">';
  for(var i=msgs.length-1;i>=0;i--){
    var m=msgs[i],d=new Date(m.timestamp);
    var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    html+='<div class="message-item"><div class="msg-header"><span class="msg-user">'+esc(m.username)+'</span><span class="msg-time">'+ds+'</span></div><div class="msg-text">'+esc(m.text)+'</div></div>'
  }
  html+='</div>';el.innerHTML=html;el.scrollTop=0;
}
function sendMessage(){
  var input=document.getElementById('messageInput');
  var text=input.value.trim();
  if(!text){toast('请输入留言内容');return}
  if(!getCurrentUser()){toast('请先设置昵称');return}
  addMessage(text);input.value='';renderMessages();toast('留言成功');
}

// ============================================================
//  14. HISTORY
// ============================================================
function showHistory(){
  show('history');renderHistory();
}
function renderHistory(){
  var results=getResults();
  var el=document.getElementById('historyList');
  if(results.length===0){el.innerHTML='<div class="history-empty">暂无测试记录<br>完成一次测试后，结果将显示在这里</div>';return}
  var html='';
  for(var i=results.length-1;i>=0;i--){
    var r=results[i],d=new Date(r.timestamp);
    var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+' '+pad(d.getHours())+':'+pad(d.getMinutes());
    html+='<div class="history-card" onclick="viewHistoryResult('+i+')"><div class="history-card-type">'+r.code+'</div><div class="history-card-info"><div class="history-card-name">'+esc(r.name)+'</div><div class="history-card-date">'+ds+'</div></div></div>'
  }
  el.innerHTML=html;
}
function viewHistoryResult(idx){
  var results=getResults();
  var r=results[idx];if(!r)return;
  var data=personalityTypes[r.code];
  if(!data)data={name:r.name,nk:'',desc:'',detail:'',p:[],n:[],c:[],ce:[]};
  showR(r.code,data,r.scores);
}
function showResultHistory(){
  var results=getResults();
  if(results.length<=1){document.getElementById('resultHistory').style.display='none';return}
  var recent=results.slice(0,-1).slice(-5).reverse();
  var html='';
  for(var i=0;i<recent.length;i++){
    var r=recent[i],d=new Date(r.timestamp);
    var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    html+='<div class="history-mini-item"><div class="history-mini-type">'+r.code+'</div><div class="history-mini-info"><div class="history-mini-name">'+esc(r.name)+'</div><div class="history-mini-date">'+ds+'</div></div></div>'
  }
  document.getElementById('resultHistoryList').innerHTML=html;
  document.getElementById('resultHistory').style.display='block';
}

// ============================================================
//  15. UTILITY
// ============================================================
function pad(n){return n<10?'0'+n:''+n}
function esc(s){
  if(typeof s!=='string')return'';
  var d=document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

// ============================================================
//  16. PAGE INIT (页面加载时自动执行)
// ============================================================
(function(){
  var user=getCurrentUser();
  if(user){updateHomeUI(user)}else{showNameModal()}
})();
</script>
